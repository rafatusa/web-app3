[web_servers]
web-app3-server ansible_host=ec2-web-app3.compute.amazonaws.com ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/web-app3-key.pem

[web_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
project_name=web-app3
app_env=production
nginx_port=80
nginx_ssl_port=443
nginx_worker_processes=auto
nginx_worker_connections=1024
nginx_server_name=web-app3.example.com
nginx_root=/var/www/web-app3
nginx_log_dir=/var/log/nginx/web-app3

[all:vars]
ansible_connection=ssh
ansible_ssh_retries=3
gather_facts=true